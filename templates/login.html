<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Disease Prediction - Login</title>
    
    <!-- Bootstrap 5 + Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #f0f4fa 0%, #d9e2ef 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
        }
        
        /* Simple decorative elements */
        .circle-1 {
            position: fixed;
            top: -100px;
            right: -100px;
            width: 300px;
            height: 300px;
            background: rgba(42, 92, 138, 0.03);
            border-radius: 50%;
            z-index: 0;
        }
        
        .circle-2 {
            position: fixed;
            bottom: -100px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: rgba(255, 59, 111, 0.03);
            border-radius: 50%;
            z-index: 0;
        }
        
        .container-custom {
            width: 100%;
            max-width: 450px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }
        
        .login-card {
            background: white;
            border-radius: 40px;
            padding: 40px 35px;
            box-shadow: 0 30px 60px rgba(0, 20, 50, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            backdrop-filter: blur(10px);
        }
        
        /* Heart Icon Small */
        .heart-icon-sm {
            font-size: 3rem;
            color: #ff3b6f;
            display: inline-block;
            animation: heartbeat 1.5s ease-in-out infinite;
            filter: drop-shadow(0 8px 12px rgba(255, 59, 111, 0.2));
            margin-bottom: 10px;
        }
        
        @keyframes heartbeat {
            0% { transform: scale(1); }
            25% { transform: scale(1.1); }
            35% { transform: scale(1); }
            45% { transform: scale(1.05); }
            55% { transform: scale(1); }
            100% { transform: scale(1); }
        }
        
        .title {
            font-size: 2rem;
            font-weight: 700;
            color: #1a2639;
            margin-bottom: 5px;
        }
        
        .subtitle {
            font-size: 0.95rem;
            color: #5a6a7c;
            margin-bottom: 30px;
        }
        
        /* Form Styles */
        .form-label {
            font-weight: 500;
            color: #1e2b3a;
            margin-bottom: 6px;
            font-size: 0.9rem;
        }
        
        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }
        
        .input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a9bb0;
            font-size: 1.2rem;
            z-index: 10;
        }
        
        .form-control-custom {
            width: 100%;
            padding: 16px 16px 16px 50px;
            border: 2px solid #e2e8f0;
            border-radius: 20px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background: #f8fafd;
        }
        
        .form-control-custom:focus {
            outline: none;
            border-color: #2a5c8a;
            background: white;
            box-shadow: 0 5px 15px rgba(42, 92, 138, 0.1);
        }
        
        .form-control-custom::placeholder {
            color: #a0b3c9;
            font-weight: 300;
        }
        
        /* Password field specific */
        .password-wrapper {
            position: relative;
        }
        
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #8a9bb0;
            cursor: pointer;
            font-size: 1.2rem;
            z-index: 10;
            background: transparent;
            border: none;
            padding: 5px;
        }
        
        .toggle-password:hover {
            color: #2a5c8a;
        }
        
        /* Remember me & Forgot password */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 25px 0 20px;
            flex-wrap: wrap;
            gap: 10px;
        }
        
        .remember-check {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .remember-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #2a5c8a;
            cursor: pointer;
        }
        
        .remember-check label {
            color: #4a5b6f;
            font-size: 0.9rem;
            cursor: pointer;
        }
        
        .forgot-link {
            color: #2a5c8a;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: color 0.2s;
        }
        
        .forgot-link:hover {
            color: #1e3c72;
            text-decoration: underline;
        }
        
        /* Login Button */
        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #b53333, #e66a41);
            color: white;
            border: none;
            border-radius: 30px;
            font-weight: 600;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            transition: all 0.3s ease;
            cursor: pointer;
            margin-bottom: 25px;
        }
        
        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(30, 60, 114, 0.3);
            background: linear-gradient(135deg, #2a5c8a, #1e3c72);
        }
        
        .btn-login:active {
            transform: translateY(0);
        }
        
        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 20px 0;
            color: #8a9bb0;
            font-size: 0.9rem;
        }
        
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid #e2e8f0;
        }
        
        .divider::before {
            margin-right: 15px;
        }
        
        .divider::after {
            margin-left: 15px;
        }
        
        /* Social Login */
        .social-login {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        
        .social-btn {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            border: 2px solid #e2e8f0;
            background: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #4a5b6f;
            transition: all 0.2s ease;
            cursor: pointer;
            text-decoration: none;
        }
        
        .social-btn:hover {
            transform: translateY(-3px);
            border-color: #2a5c8a;
            color: #2a5c8a;
            box-shadow: 0 8px 15px rgba(42, 92, 138, 0.15);
        }
        
        /* Register Link */
        .register-link {
            text-align: center;
            margin-top: 20px;
            color: #5a6a7c;
            font-size: 0.95rem;
        }
        
        .register-link a {
            color: #2a5c8a;
            font-weight: 600;
            text-decoration: none;
            margin-left: 5px;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        /* Back to Home */
        .back-home {
            text-align: center;
            margin-top: 20px;
        }
        
        .back-home a {
            color: #6c7e95;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: color 0.2s;
        }
        
        .back-home a:hover {
            color: #1e3c72;
        }
        
        /* Alert Messages */
        .alert {
            padding: 12px 16px;
            border-radius: 15px;
            margin-bottom: 25px;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border: none;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
            border-left: 5px solid #28a745;
        }
        
        .alert-danger {
            background: #f8d7da;
            color: #721c24;
            border-left: 5px solid #dc3545;
        }
        
        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border-left: 5px solid #17a2b8;
        }
        
        /* Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 30px 20px;
                border-radius: 30px;
            }
            
            .title {
                font-size: 1.8rem;
            }
            
            .form-options {
                flex-direction: column;
                align-items: flex-start;
                gap: 15px;
            }
            
            .btn-login {
                padding: 14px;
                font-size: 1rem;
            }
            
            .social-btn {
                width: 45px;
                height: 45px;
                font-size: 1.3rem;
            }
        }
        
        @media (max-width: 360px) {
            .login-card {
                padding: 25px 15px;
            }
            
            .heart-icon-sm {
                font-size: 2.5rem;
            }
            
            .title {
                font-size: 1.6rem;
            }
        }
        
        /* Remove autofill background */
        input:-webkit-autofill,
        input:-webkit-autofill:hover,
        input:-webkit-autofill:focus {
            -webkit-box-shadow: 0 0 0px 1000px #f8fafd inset;
            transition: background-color 5000s ease-in-out 0s;
        }
    </style>
</head>
<body>

    <!-- Simple decorative circles -->
    <div class="circle-1"></div>
    <div class="circle-2"></div>

    <div class="container-custom">
        <div class="login-card">
            
            <!-- Header with Heart -->
            <div class="text-center">
                <div class="heart-icon-sm">
                    <i class="bi bi-heart-pulse-fill"></i>
                </div>
                <h2 class="title">User Login </h2>
                <p class="subtitle">Login to continue your health journey</p>
            </div>
            
            <!-- Login Form -->
            <form method="POST" id="loginForm" onsubmit="return validateForm()">
                <!-- Email Field -->
                <div class="input-group-custom">
                    <span class="input-icon"><i class="bi bi-envelope-fill"></i></span>
                    <input type="email" 
                           name="email" 
                           class="form-control-custom" 
                           placeholder="Enter your email"
                           id="email"
                           required
                           autocomplete="email">
                </div>
                
                <!-- Password Field with Toggle -->
                <div class="input-group-custom">
                    <span class="input-icon"><i class="bi bi-lock-fill"></i></span>
                    <input type="password" 
                           name="password" 
                           class="form-control-custom" 
                           placeholder="Enter your password"
                           id="password"
                           required
                           autocomplete="current-password">
                    <button type="button" class="toggle-password" onclick="togglePassword()">
                        <i class="bi bi-eye-slash-fill" id="toggleIcon"></i>
                    </button>
                </div>
                
                <!-- Form Options -->
                <div class="form-options">
                    <div class="remember-check">
                        <input type="checkbox" id="remember" name="remember">
                        <label for="remember">Remember me</label>
                    </div>
                    <a href="#" class="forgot-link">Forgot Password?</a>
                </div>
                
                <!-- Login Button -->
                <button type="submit" class="btn-login">
                    <i class="bi bi-box-arrow-in-right"></i>
                    Login to Dashboard
                </button>
            </form>
            
            <!-- Divider -->
            <div class="divider">or login with</div>
            
            <!-- Social Login -->
            <div class="social-login">
                <a href="#" class="social-btn" title="Google">
                    <i class="bi bi-google"></i>
                </a>
                <a href="#" class="social-btn" title="Facebook">
                    <i class="bi bi-facebook"></i>
                </a>
                <a href="#" class="social-btn" title="Apple">
                    <i class="bi bi-apple"></i>
                </a>
            </div>
            
            <!-- Register Link -->
            <div class="register-link">
                Don't have an account?
                <a href="/register">Create Free Account</a>
            </div>
            
            <!-- Back to Home -->
            <div class="back-home">
                <a href="/">
                    <i class="bi bi-arrow-left"></i>
                    Back to Home
                </a>
            </div>
            
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <!-- Custom Scripts -->
    <script>
        // Toggle Password Visibility
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye-slash-fill');
                toggleIcon.classList.add('bi-eye-fill');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye-fill');
                toggleIcon.classList.add('bi-eye-slash-fill');
            }
        }
        
        // Form Validation
        function validateForm() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                alert('Please fill in all fields');
                return false;
            }
            
            // Basic email validation
            const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailPattern.test(email)) {
                alert('Please enter a valid email address');
                return false;
            }
            
            return true;
        }
        
        // Clear form on page load/refresh
        window.onload = function() {
            document.getElementById('loginForm').reset();
            
            // Clear any browser autofilled values
            setTimeout(function() {
                document.getElementById('loginForm').reset();
            }, 100);
        }
        
        // Clear on page refresh (when user hits refresh button)
        window.addEventListener('beforeunload', function() {
            document.getElementById('loginForm').reset();
        });
        
        // Optional: Show demo credentials for testing
        console.log('Demo: test@example.com / password123');
    </script>
    
    <!-- Optional: Display flash messages (if any from backend) -->
    <!-- Uncomment if using Flask with flash messages -->
    <!--
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert alert-{{ category }} animate__animated animate__fadeIn">
                    <i class="bi bi-{{ 'check-circle-fill' if category == 'success' else 'exclamation-triangle-fill' }}"></i>
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    {% endwith %}
    -->
    
</body>
</html>
